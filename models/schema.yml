version: 2

sources:
  - name: raw
    schema: gz_raw_data
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: "Sales of Greenweez (one row per product_id in each orders_id)."
        config:
          loaded_at_field: "CAST(date_date AS TIMESTAMP)"
          freshness:
            warn_after: {count: 90, period: day}
        tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - orders_id
                  - pdt_id
        columns:
          - name: date_date
            description: "Date of purchase."
          - name: orders_id
            description: "Foreign key to ship."
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'ship')
                  field: orders_id
          - name: pdt_id
            description: "Foreign key to product."
            tests:
              - not_null
              - relationships:
                  to: source('raw', 'product')
                  field: products_id
          - name: revenue
            description: "revenue = quantity * selling_price"
          - name: quantity
            description: "Quantity purchased."

      - name: product
        identifier: raw_gz_product
        description: "Products of Greenweez."
        columns:
          - name: products_id
            description: "Primary key."
            tests: [unique, not_null]
          - name: purchse_price
            description: "Raw purchase price (will be cast/renamed in staging)."

      - name: ship
        identifier: raw_gz_ship
        description: "Shipping data for Greenweez orders."
        columns:
          - name: orders_id
            description: "Primary key."
            tests: [unique, not_null]
          - name: shipping_fee
            description: "Shipping fee paid by customer."
          - name: logcost
            description: "Warehouse/logistics preparation cost."
          - name: ship_cost
            description: "Carrier cost paid by Greenweez."

      - name: adwords
        identifier: raw_gz_adwords

      - name: bing
        identifier: raw_gz_bing

      - name: criteo
        identifier: raw_gz_criteo

      - name: facebook
        identifier: raw_gz_facebook